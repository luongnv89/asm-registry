name: Validate PR

on:
  pull_request:
    paths:
      - "manifests/**"

permissions:
  contents: read

jobs:
  validate-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install ajv-cli
        run: npm install -g ajv-cli ajv-formats

      - name: Find changed manifests
        id: changed
        run: |
          files=$(git diff --name-only --diff-filter=ACMR origin/main...HEAD -- 'manifests/**/*.json')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$files" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate schema
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "Validating $file..."
            ajv validate -s schema/manifest.v1.json -d "$file" --spec=draft7 -c ajv-formats
          done <<< "$CHANGED_FILES"

      - name: Author identity check
        if: steps.changed.outputs.files != ''
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            dir_author=$(echo "$file" | sed 's|manifests/\([^/]*\)/.*|\1|')
            dir_author_lower=$(echo "$dir_author" | tr '[:upper:]' '[:lower:]')
            pr_author_lower=$(echo "$PR_AUTHOR" | tr '[:upper:]' '[:lower:]')
            if [ "$dir_author_lower" != "$pr_author_lower" ]; then
              echo "::error::Author mismatch: manifest in manifests/$dir_author/ but PR opened by $PR_AUTHOR"
              exit 1
            fi
            # Verify the JSON author field matches the directory name (case-insensitive)
            json_author=$(jq -r '.author' "$file")
            json_author_lower=$(echo "$json_author" | tr '[:upper:]' '[:lower:]')
            if [ "$json_author_lower" != "$dir_author_lower" ]; then
              echo "::error::Author field mismatch: JSON author '$json_author' does not match directory '$dir_author'"
              exit 1
            fi
          done <<< "$CHANGED_FILES"

      - name: Duplicate check
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            author=$(cat "$file" | jq -r '.author')
            name=$(cat "$file" | jq -r '.name')
            commit=$(cat "$file" | jq -r '.commit')
            # Check if identical author/name/commit exists on main
            main_file="manifests/$author/$name.json"
            if git show "origin/main:$main_file" 2>/dev/null | jq -r '.commit' | grep -q "^${commit}$"; then
              echo "::error::Duplicate: $author/$name already exists with commit $commit"
              exit 1
            fi
          done <<< "$CHANGED_FILES"

      - name: Typosquat detection
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          # Build list of existing skill names from index.json on main
          # Uses origin/main to prevent a PR from modifying index.json to bypass detection
          existing=$(git show origin/main:index.json 2>/dev/null | jq -r '.manifests[].name' 2>/dev/null || echo "")
          typosquat_found=false

          while IFS= read -r file; do
            [ -z "$file" ] && continue
            new_name=$(jq -r '.name' "$file")

            # Check Levenshtein distance against all existing names
            while IFS= read -r existing_name; do
              [ -z "$existing_name" ] && continue
              [ "$new_name" = "$existing_name" ] && continue

              # Inline Levenshtein via node — pass names through env vars to prevent shell injection
              distance=$(NEW_NAME="$new_name" EXISTING_NAME="$existing_name" node -e "
                const a = process.env.NEW_NAME, b = process.env.EXISTING_NAME;
                const m = a.length, n = b.length;
                const d = Array.from({length: m+1}, (_,i) => {
                  const row = new Array(n+1);
                  row[0] = i;
                  return row;
                });
                for (let j = 0; j <= n; j++) d[0][j] = j;
                for (let i = 1; i <= m; i++)
                  for (let j = 1; j <= n; j++)
                    d[i][j] = Math.min(
                      d[i-1][j] + 1,
                      d[i][j-1] + 1,
                      d[i-1][j-1] + (a[i-1] !== b[j-1] ? 1 : 0)
                    );
                console.log(d[m][n]);
              ")

              if [ "$distance" -le 2 ]; then
                echo "::error::Typosquat risk: '$new_name' is within Levenshtein distance $distance of existing skill '$existing_name'"
                typosquat_found=true
              fi
            done <<< "$existing"
          done <<< "$CHANGED_FILES"

          if [ "$typosquat_found" = "true" ]; then
            echo "::error::One or more skill names are suspiciously similar to existing skills. Failing to prevent typosquatting."
            exit 1
          fi

      - name: Check manifest security verdict
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            verdict=$(jq -r '.security_verdict' "$file")
            name=$(jq -r '.name' "$file")
            if [ "$verdict" = "dangerous" ]; then
              echo "::error::Manifest $name declares security_verdict=dangerous — submission rejected"
              exit 1
            fi
          done <<< "$CHANGED_FILES"

      - name: Independent security scan
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            repo=$(jq -r '.repository' "$file")
            commit=$(jq -r '.commit' "$file")
            name=$(jq -r '.name' "$file")
            skill_path=$(jq -r '.skill_path // empty' "$file")

            # Validate extracted values against strict patterns to prevent shell injection
            if ! echo "$repo" | grep -qE '^https://github\.com/[a-zA-Z0-9_-]+/[a-zA-Z0-9._-]+$'; then
              echo "::error::Invalid repository URL in manifest: $file"
              exit 1
            fi
            if ! echo "$commit" | grep -qE '^[0-9a-f]{40}$'; then
              echo "::error::Invalid commit SHA in manifest: $file"
              exit 1
            fi
            if ! echo "$name" | grep -qE '^[a-z0-9]([a-z0-9-]*[a-z0-9])?$'; then
              echo "::error::Invalid skill name in manifest: $file"
              exit 1
            fi
            # Validate skill_path if present: no ".." traversal, no leading slash
            if [ -n "$skill_path" ]; then
              if echo "$skill_path" | grep -qE '(^\/)|(\.\./)|(\/\.\.)|(^\.\.$)'; then
                echo "::error::Invalid skill_path in manifest (path traversal): $file"
                exit 1
              fi
            fi

            echo "Cloning $repo at $commit for security scan..."
            clone_dir=$(mktemp -d)

            if [ -n "$skill_path" ]; then
              # Multi-skill repo: use sparse-checkout to fetch only the skill subdirectory
              echo "  Using sparse-checkout for skill_path: $skill_path"
              git init "$clone_dir" --quiet
              (
                cd "$clone_dir"
                git remote add origin "$repo"
                git config core.sparseCheckout true
                echo "$skill_path" >> .git/info/sparse-checkout
                timeout 120 git fetch --quiet --depth 1 origin "$commit"
                git checkout --quiet FETCH_HEAD
              )
            else
              # Single-skill repo at root: full clone
              timeout 120 git clone --quiet --no-checkout "$repo" "$clone_dir"
              # Enforce a 200 MB size limit on cloned repos
              clone_size=$(du -sm "$clone_dir" | cut -f1)
              if [ "$clone_size" -gt 200 ]; then
                echo "::error::Cloned repository for $name exceeds 200 MB size limit (${clone_size} MB)"
                rm -rf "$clone_dir"
                exit 1
              fi
              (cd "$clone_dir" && git checkout --quiet "$commit")
            fi

            # Determine the directory to scan
            if [ -n "$skill_path" ]; then
              scan_dir="$clone_dir/$skill_path"
            else
              scan_dir="$clone_dir"
            fi

            # Verify the skill directory exists
            if [ ! -d "$scan_dir" ]; then
              echo "::error::skill_path '$skill_path' not found in repository for $name"
              rm -rf "$clone_dir"
              exit 1
            fi

            # Run the SecurityAuditor skill against the skill directory
            echo "Running security audit on $name (scanning: $scan_dir)..."
            verdict="pass"

            # Check for dangerous patterns in skill files
            # NOTE: These patterns should be kept in sync with the SCAN_PATTERNS in
            # the asm repo's src/security-auditor.ts.
            dangerous_patterns=(
              'rm -rf /'
              'curl.*\| ?sh'
              'wget.*\| ?sh'
              '\beval\('
              '\bchild_process\b'
              '\bexec\('
              '\bexecSync\('
              'dangerouslyDisableSandbox'
            )
            for pattern in "${dangerous_patterns[@]}"; do
              if grep -r -E -l "$pattern" "$scan_dir" --include='*.js' --include='*.ts' --include='*.sh' --include='*.md' 2>/dev/null | head -1 | grep -q .; then
                echo "::warning::Dangerous pattern '$pattern' found in $name"
                verdict="dangerous"
              fi
            done

            # Check for data exfiltration patterns
            sensitive_read_patterns=(
              'fs\.readFile.*\.ssh'
              'fs\.readFile.*\.aws'
              'fs\.readFile.*\.env'
            )
            for pattern in "${sensitive_read_patterns[@]}"; do
              if grep -r -E "$pattern" "$scan_dir" --include='*.js' --include='*.ts' 2>/dev/null | head -1 | grep -q .; then
                echo "::warning::Potential data exfiltration pattern '$pattern' found in $name"
                verdict="dangerous"
              fi
            done

            # Flag files that both read process.env and send data over the network
            env_files=$(grep -r -E -l 'process\.env' "$scan_dir" --include='*.js' --include='*.ts' 2>/dev/null || true)
            if [ -n "$env_files" ]; then
              network_pattern='\b(fetch|http\.request|https\.request|axios|XMLHttpRequest)\b'
              for ef in $env_files; do
                if grep -E -q "$network_pattern" "$ef" 2>/dev/null; then
                  echo "::warning::File accesses process.env and performs network requests in $name: $ef"
                  verdict="dangerous"
                fi
              done
            fi

            rm -rf "$clone_dir"

            if [ "$verdict" = "dangerous" ]; then
              echo "::error::Security scan FAILED for $name — dangerous patterns detected"
              exit 1
            fi

            echo "Security scan passed for $name"
          done <<< "$CHANGED_FILES"
